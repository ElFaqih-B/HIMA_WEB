<!DOCTYPE html>
<html lang="id">
<head>
    {% include 'components/admin_head.html' %}
</head>
<body class="text-slate-800 flex h-screen overflow-hidden font-sans">
    
    {% include 'components/admin_sidebar.html' %}

    <div class="flex-1 flex flex-col h-full min-w-0 overflow-hidden">
        <header class="bg-white h-20 px-4 sm:px-8 flex items-center justify-between border-b border-slate-100 shrink-0">
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Edit Program Kerja</h1>
            <a href="{{ url_for('admin.admin_proker') }}" class="text-sm font-semibold text-slate-500 hover:text-slate-800 transition">← Kembali</a>
        </header>

        <div class="flex-1 overflow-y-auto p-4 sm:p-8">
            <div class="bg-white rounded-3xl border border-slate-100 p-6 sm:p-8 max-w-2xl shadow-sm mx-auto">
                <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2"><span>🎯</span> Perbarui Data Proker</h2>
                
                <form action="{{ url_for('admin.update_proker', id=proker.id) }}" method="POST" class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Nama Program Kerja</label>
                        <input type="text" name="nama_proker" value="{{ proker.nama_program }}" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-primary-900 focus:border-transparent transition">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Deskripsi Singkat</label>
                        <textarea name="deskripsi" rows="4" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-primary-900 focus:border-transparent transition">{{ proker.deskripsi }}</textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Status Pelaksanaan</label>
                        <select name="status" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-primary-900 focus:border-transparent transition font-semibold text-slate-700 cursor-pointer">
                            <option value="planned" {% if proker.status == 'planned' %}selected{% endif %}>📅 Terencana (Planned)</option>
                            <option value="ongoing" {% if proker.status == 'ongoing' %}selected{% endif %}>🚀 Berjalan (Ongoing)</option>
                            <option value="postponed" {% if proker.status == 'postponed' %}selected{% endif %}>⏸️ Ditunda (Postponed)</option>
                            <option value="done" {% if proker.status == 'done' %}selected{% endif %}>✅ Selesai (Done)</option>
                            <option value="cancelled" {% if proker.status == 'cancelled' %}selected{% endif %}>❌ Dibatalkan (Cancelled)</option>
                        </select>
                        <p class="text-xs text-slate-400 mt-2">Status akan mempengaruhi tampilan badge (lencana) di halaman publik.</p>
                    </div>

                    <div class="mt-8 border-t border-slate-100 pt-6 text-right">
                        <button type="submit" class="px-8 py-3 bg-primary-900 hover:bg-primary-950 text-white font-bold rounded-xl shadow-md transition">
                            Simpan Perubahan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
