<!DOCTYPE html>
<html lang="id">
<head>
    {% include 'components/admin_head.html' %}
</head>
<body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden font-sans">
    {% include 'components/admin_sidebar.html' %}
    
    <div class="flex-1 flex flex-col h-full min-w-0 overflow-hidden">
        <header class="bg-white h-20 px-4 sm:px-8 flex items-center border-b border-slate-100 shrink-0">
            <button id="menu-toggle-btn" class="md:hidden p-2 rounded-xl text-slate-500 hover:bg-slate-50 mr-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Pengaturan Sistem</h1>
        </header>

        <div class="flex-1 overflow-y-auto p-4 sm:p-8">
            <div class="bg-primary-50 rounded-3xl border border-primary-100 p-6 sm:p-8 max-w-3xl shadow-sm">
                <h2 class="text-xl font-bold text-primary-900 mb-2 flex items-center gap-2"><span>⚙️</span> Ganti Background Landing Page</h2>
                <p class="text-sm text-primary-900/70 mb-6 font-medium">Ubah gambar latar utama situs publik secara langsung dari cloud server.</p>
                
                <form action="/update_hero" method="POST" enctype="multipart/form-data" class="space-y-5">
                    
                    <div id="preview-container" class="hidden">
                        <label class="block text-xs font-bold text-primary-900 uppercase tracking-widest mb-2 font-mono">Preview Background</label>
                        <img id="preview-image" src="#" alt="Preview" class="w-full h-48 sm:h-64 object-cover rounded-2xl border-2 border-primary-200 shadow-sm">
                    </div>

                    <div>
                        <input type="file" id="gambar_hero" name="gambar_hero" accept="image/*" required onchange="previewFile()" class="block w-full text-sm text-primary-900 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-white file:text-primary-900 hover:file:bg-slate-100 border border-primary-200 rounded-xl bg-white p-2 shadow-sm cursor-pointer transition">
                    </div>
                    
                    <button type="submit" class="w-full sm:w-auto px-8 py-3.5 bg-primary-900 hover:bg-primary-950 text-white font-bold rounded-xl transition shadow-md shadow-primary-900/10">Simpan Perubahan</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function previewFile() {
            const previewContainer = document.getElementById('preview-container');
            const previewImage = document.getElementById('preview-image');
            const fileInput = document.getElementById('gambar_hero');
            const file = fileInput.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    previewContainer.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            } else {
                previewImage.src = "#";
                previewContainer.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
