<!DOCTYPE html>
<html lang="id">
<head>
    {% include 'components/admin_head.html' %}
</head>
<body class="bg-slate-50 text-slate-800 flex h-[100dvh] overflow-hidden font-sans relative">
    {% include 'components/admin_sidebar.html' %}
    <div class="flex-1 flex flex-col h-full min-w-0 overflow-hidden bg-slate-50/50">
        <header class="bg-white h-16 sm:h-20 px-4 sm:px-6 flex items-center gap-4 border-b border-slate-100">
            <a href="/admin/struktur" class="p-2 text-slate-400 hover:text-slate-700 bg-slate-50 rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
            <h1 class="text-lg sm:text-xl font-bold text-slate-900">Tambah Fungsionaris Baru</h1>
        </header>
        <div class="flex-1 overflow-y-auto p-4 sm:p-8">
            <div class="bg-white rounded-2xl border border-slate-200 p-6 max-w-3xl mx-auto shadow-sm">
                <form action="{{ url_for('admin.tambah_struktur') }}" method="POST" enctype="multipart/form-data" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 font-mono">Nama Lengkap</label>
                            <input type="text" name="nama" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary-900 text-sm transition outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 font-mono">Periode</label>
                            <select name="periode" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm cursor-pointer font-semibold text-slate-700 outline-none">
                                <option value="2025/2026">2025/2026</option>
                                <option value="2026/2027">2026/2027</option>
                                <option value="2027/2028">2027/2028</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 font-mono">Divisi</label>
                            <select name="divisi" id="divisiSelect" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm cursor-pointer font-semibold text-slate-700 outline-none">
                                <option value="Badan Pengurus Harian (BPH)">Badan Pengurus Harian (BPH)</option>
                                <option value="Divisi Internal">Divisi Internal</option>
                                <option value="Divisi Eksternal">Divisi Eksternal</option>
                                <option value="Divisi Keuangan">Divisi Keuangan</option>
                                <option value="Divisi Minfo">Divisi Minfo</option>
                                <option value="Divisi Minat dan Bakat">Divisi Minat dan Bakat</option>
                                <option value="Divisi Reaksi">Divisi Reaksi</option>
                                <option value="Divisi Sosmas">Divisi Sosmas</option>
                                <option value="Pembimbing">Pembimbing</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 font-mono">Jabatan</label>
                            <select name="jabatan" id="jabatanSelect" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm cursor-pointer font-semibold text-slate-700 outline-none">
                                <!-- Dirender dinamis oleh JS -->
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 font-mono">Foto (Opsional)</label>
                        <input type="file" name="foto_pengurus" id="fotoInput" accept="image/*" onchange="previewFile()" class="block w-full text-sm text-slate-500 border border-slate-200 rounded-xl bg-slate-50 p-2">
                        <img id="preview" class="hidden w-20 h-20 mt-4 rounded-full object-cover border border-slate-200">
                    </div>
                    <button type="submit" class="w-full py-3 bg-primary-900 hover:bg-primary-950 text-white font-bold rounded-xl shadow-md transition font-mono uppercase text-xs tracking-widest">Simpan Data</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const jabatanOptions = {
            'Badan Pengurus Harian (BPH)': [
                'Ketua Himpunan',
                'Wakil Ketua Himpunan',
                'Sekretaris I',
                'Sekretaris II',
                'Bendahara I',
                'Bendahara II',
            ],
            'Pembimbing': [
                'Dosen Pembimbing',
            ],
            '_default': [
                'Kepala Divisi',
                'Sekretaris Divisi',
                'Anggota',
            ]
        };

        const divisiSelect  = document.getElementById('divisiSelect');
        const jabatanSelect = document.getElementById('jabatanSelect');

        function renderJabatan(divisi) {
            const opts = jabatanOptions[divisi] || jabatanOptions['_default'];
            jabatanSelect.innerHTML = '';
            opts.forEach(j => {
                const opt = document.createElement('option');
                opt.value = j;
                opt.textContent = j;
                jabatanSelect.appendChild(opt);
            });
        }

        renderJabatan(divisiSelect.value);
        divisiSelect.addEventListener('change', () => renderJabatan(divisiSelect.value));

        function previewFile() {
            const preview = document.getElementById('preview');
            const file    = document.getElementById('fotoInput').files[0];
            if (!file) return;
            const reader  = new FileReader();
            reader.onload = e => { preview.src = e.target.result; preview.classList.remove('hidden'); };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
