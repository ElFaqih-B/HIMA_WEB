<style>
:root{ --g-50: #f0fdf4; --g-100: #dcfce7; --g-200: #bbf7d0; --g-800: #166534; --g-900: #113f2e; --g-950: #06261b; --paper: #fcfefb; --ink: var(--g-950); --muted: #45614f; --line: rgba(17,63,46,.16); --line-on-dark: rgba(240,253,244,.18); --serif: var(--font-heading), Georgia, serif; --sans: var(--font-primary); --mono: var(--font-mono); --nav-h: 4.5rem; --ease-decay: cubic-bezier(.16,.84,.32,1); --radius: 7px; --wrap: 1180px; }
.nav{ position:sticky; top:0; z-index:100; height:var(--nav-h); display:flex; align-items:center; background:rgba(252,254,251,.82); backdrop-filter:blur(10px); border-bottom:1px solid transparent; transition:border-color .25s var(--ease-decay), background .25s var(--ease-decay); }
.nav.is-scrolled{ border-bottom-color:var(--line); background:rgba(252,254,251,.94); }
.nav .wrap{ width:100%; max-width:var(--wrap); margin:0 auto; padding:0 1.75rem; display:flex; align-items:center; justify-content:space-between; gap:1.5rem; }
.brand{ display:flex; align-items:center; gap:.7rem; text-decoration: none; color: var(--ink);}
.brand-mark{ font-family:var(--mono); font-weight:600; font-size:.78rem; width:2.1rem; height:2.1rem; display:flex; align-items:center; justify-content:center; background:var(--g-950); color:var(--g-50); border-radius:5px; flex-shrink:0; }
.brand-text{ display:flex; flex-direction:column; line-height:1.15; }
.brand-text strong{ font-family:var(--serif); font-size:1.05rem; font-weight:600; }
.brand-text span{ font-family:var(--mono); font-size:.68rem; letter-spacing:.06em; color:var(--muted); text-transform:uppercase; }
.nav-links{ display:flex; align-items:center; gap:2rem; }
.nav-links a{ font-family:var(--mono); font-size:.82rem; letter-spacing:.03em; color:var(--muted); position:relative; padding:.3rem 0; text-decoration: none;}
.nav-links a::after{ content:""; position:absolute; left:0; bottom:-2px; width:0; height:1.5px; background:var(--g-800); transition:width .25s var(--ease-decay); }
.nav-links a:hover, .nav-links a.active{ color:var(--g-900); }
.nav-links a:hover::after, .nav-links a.active::after{ width:100%; }

/* Style tombol CTA digabungkan untuk Desktop dan Mobile */
.nav-cta, .nav-drawer-cta { font-family:var(--mono); font-size:.78rem; letter-spacing:.04em; text-transform:uppercase; background:var(--g-800); color:var(--g-50); padding:.6rem 1.1rem; border-radius:6px; text-decoration:none;}
.nav-cta:hover, .nav-drawer-cta:hover { background:var(--g-900); }
/* Tambahan jarak khusus untuk versi Mobile */
.nav-drawer-cta { margin-top: 1.5rem; text-align: center; }

.nav-toggle{ display:none; background:none; border:1px solid var(--line); border-radius:6px; width:2.4rem; height:2.4rem; align-items:center; justify-content:center; color:var(--g-950); cursor:pointer;}
.nav-drawer{ display:none; position:fixed; inset:var(--nav-h) 0 auto 0; z-index:99; background:var(--paper); border-bottom:1px solid var(--line); flex-direction:column; padding:.5rem 1.75rem 1.5rem; transform:translateY(-8px); opacity:0; pointer-events:none; transition:opacity .2s var(--ease-decay), transform .2s var(--ease-decay); }
.nav-drawer.open{ opacity:1; transform:translateY(0); pointer-events:auto; }

/* Pengecualian agar desain CTA Mobile tidak tertimpa garis bawah menu biasa */
.nav-drawer a:not(.nav-drawer-cta) { font-family:var(--mono); font-size:.95rem; padding:.85rem 0; border-bottom:1px solid var(--line); color:var(--g-950); text-decoration:none;}

@media (max-width: 760px){ .nav-links, .nav-cta{ display:none; } .nav-toggle, .nav-drawer{ display:flex; } }
</style>

<header class="nav" id="siteNav">
  <div class="wrap">
    <a href="{{ url_for('public.index') }}" class="brand">
      <img src="{{ url_for('static', filename='img/icon.png') }}" alt="Logo" class="w-8 h-8 object-contain">
      <span class="brand-text"><strong>HIMA TEKNOKIMIA NUKLIR</strong><span>POLITEKNIK TEKNOLOGI NUKLIR</span></span>
    </a>
    <nav class="nav-links">
      <a href="{{ url_for('public.index') }}#beranda">Beranda</a>
      <a href="{{ url_for('public.index') }}#tentang">Tentang</a>
      <a href="{{ url_for('public.index') }}#kegiatan">Kegiatan</a>
      <a href="{{ url_for('public.index') }}#berita">Publikasi</a>
      
      <a href="https://drive.google.com/drive/folders/1cURykHoJWo6xkeHE99uZE_wG0-WbGqi_" target="_blank" rel="noopener noreferrer">Bank Soal</a>
      
      <a href="{{ url_for('public.struktur') }}" {% if request.endpoint == 'public.struktur' %}class="active"{% endif %}>Struktur</a>
    </nav>

    <button class="nav-toggle" id="navToggle" aria-label="Buka menu" aria-expanded="false"><svg width="18" height="14" viewBox="0 0 18 14" fill="none"><path d="M0 1h18M0 7h18M0 13h18" stroke="currentColor" stroke-width="1.4"/></svg></button>
  </div>
  
  <nav class="nav-drawer" id="navDrawer">
    <a href="{{ url_for('public.index') }}#beranda">Beranda</a>
    <a href="{{ url_for('public.index') }}#tentang">Tentang</a>
    <a href="{{ url_for('public.index') }}#kegiatan">Kegiatan</a>
    <a href="{{ url_for('public.index') }}#berita">Publikasi</a>
    
    <a href="https://drive.google.com/drive/folders/1cURykHoJWo6xkeHE99uZE_wG0-WbGqi_" target="_blank" rel="noopener noreferrer">Bank Soal</a>
    
    <a href="{{ url_for('public.struktur') }}">Struktur</a>
    

  </nav>
</header>
<script>
  const navToggle = document.getElementById('navToggle');
  const navDrawer = document.getElementById('navDrawer');
  const siteNav = document.getElementById('siteNav');

  // Toggle hamburger
  navToggle.addEventListener('click', () => {
    const isOpen = navDrawer.classList.toggle('open');
    navToggle.setAttribute('aria-expanded', isOpen);
  });

  // Tutup drawer kalau klik di luar
  document.addEventListener('click', (e) => {
    if (!siteNav.contains(e.target)) {
      navDrawer.classList.remove('open');
      navToggle.setAttribute('aria-expanded', 'false');
    }
  });

  // Tutup drawer kalau klik salah satu link
  navDrawer.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      navDrawer.classList.remove('open');
      navToggle.setAttribute('aria-expanded', 'false');
    });
  });

  // Scroll effect untuk navbar
  const observer = new IntersectionObserver(
    ([e]) => siteNav.classList.toggle('is-scrolled', !e.isIntersecting),
    { threshold: 1 }
  );
  // Dummy sentinel element untuk deteksi scroll
  const sentinel = document.createElement('div');
  sentinel.style.height = '1px';
  document.body.prepend(sentinel);
  observer.observe(sentinel);
</script>
