<div id="sidebar-backdrop" class="fixed inset-0 bg-[#06261b]/50 backdrop-blur-sm z-[60] hidden md:hidden transition-opacity duration-300 opacity-0"></div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const openBtn = document.getElementById('menu-toggle-btn');
        const closeBtn = document.getElementById('close-sidebar-btn');
        const sidebar = document.getElementById('admin-sidebar');
        const backdrop = document.getElementById('sidebar-backdrop');
        
        function toggleMobileSidebar(open) {
            if(open) { 
                backdrop.classList.remove('hidden'); 
                setTimeout(() => {
                    sidebar.classList.remove('-translate-x-full'); 
                    backdrop.classList.remove('opacity-0');
                }, 10);
                document.body.classList.add('overflow-hidden'); 
            } else { 
                sidebar.classList.add('-translate-x-full'); 
                backdrop.classList.add('opacity-0'); 
                setTimeout(() => { backdrop.classList.add('hidden'); }, 300);
                document.body.classList.remove('overflow-hidden'); 
            }
        }
        if(openBtn) openBtn.addEventListener('click', () => toggleMobileSidebar(true));
        if(closeBtn) closeBtn.addEventListener('click', () => toggleMobileSidebar(false));
        if(backdrop) backdrop.addEventListener('click', () => toggleMobileSidebar(false));
    });
</script>
